name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

env:
  REGISTRY: ghcr.io
  IMAGE_REGISTRY_PATH: ghcr.io/${{ github.repository_owner }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install flake8
        run: pip install flake8

      - name: Lint API with flake8
        run: flake8 api/ --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install eslint
        run: npm install -g eslint

      - name: Lint Frontend with eslint
        run: eslint frontend/ || true

      - name: Install hadolint
        run: |
          mkdir -p /tmp/hadolint
          wget -O /tmp/hadolint/hadolint https://github.com/hadolint/hadolint/releases/download/v2.12.0/hadolint-Linux-x86_64
          chmod +x /tmp/hadolint/hadolint
          echo "/tmp/hadolint" >> $GITHUB_PATH

      - name: Lint Dockerfiles with hadolint
        run: |
          hadolint api/Dockerfile || true
          hadolint worker/Dockerfile || true
          hadolint frontend/Dockerfile || true

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r api/requirements.txt

      - name: Run API tests with pytest
        run: |
          cd api/tests
          pytest test_main.py -v --cov=. --cov-report=xml --cov-report=html --cov-report=term

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: api/htmlcov/
          if-no-files-found: warn

      - name: Upload coverage to Codecov (optional)
        uses: codecov/codecov-action@v3
        with:
          file: ./api/coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: |
            ${{ env.IMAGE_REGISTRY_PATH }}/api:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_REGISTRY_PATH }}/api:latest
          cache-from: type=registry,ref=${{ env.IMAGE_REGISTRY_PATH }}/api:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_REGISTRY_PATH }}/api:buildcache,mode=max

      - name: Build and push Worker image
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: |
            ${{ env.IMAGE_REGISTRY_PATH }}/worker:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_REGISTRY_PATH }}/worker:latest
          cache-from: type=registry,ref=${{ env.IMAGE_REGISTRY_PATH }}/worker:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_REGISTRY_PATH }}/worker:buildcache,mode=max

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.IMAGE_REGISTRY_PATH }}/frontend:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_REGISTRY_PATH }}/frontend:latest
          cache-from: type=registry,ref=${{ env.IMAGE_REGISTRY_PATH }}/frontend:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_REGISTRY_PATH }}/frontend:buildcache,mode=max

  security-scan:
    name: security-scan
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: read
      security-events: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Trivy FS Scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload SARIF Artifact
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
  

      - name: Run Trivy scan on API
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: '${{ env.IMAGE_REGISTRY_PATH }}/api:${{ env.IMAGE_TAG }}'
          format: 'table'
          severity: 'CRITICAL'
          exit-code: '1' 
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: security-scan
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create docker-compose for integration test
        run: |
          cat > docker-compose.override.yml << 'EOF'
          version: '3.9'
          services:
            api:
              image: ${{ env.IMAGE_REGISTRY_PATH }}/api:${{ env.IMAGE_TAG }}
              pull_policy: always
            worker:
              image: ${{ env.IMAGE_REGISTRY_PATH }}/worker:${{ env.IMAGE_TAG }}
              pull_policy: always
            frontend:
              image: ${{ env.IMAGE_REGISTRY_PATH }}/frontend:${{ env.IMAGE_TAG }}
              pull_policy: always
          EOF

      - name: Start full stack
        run: docker-compose -f docker-compose.yml up -d

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for services to start..."
          max_attempts=30
          attempt=0
          while [ $attempt -lt $max_attempts ]; do
            if docker ps | grep -q "healthy"; then
              echo "Services are healthy"
              break
            fi
            echo "Attempt $((attempt + 1))/$max_attempts: Waiting for services..."
            sleep 2
            attempt=$((attempt + 1))
          done

      - name: Check service health
        run: |
          echo "API health check:"
          curl -f http://localhost:8000/health || exit 1
          echo "Frontend health check:"
          curl -f http://localhost:3000/health || exit 1

      - name: Submit a test job
        run: |
          response=$(curl -s -X POST http://localhost:3000/submit)
          echo "Submit response: $response"
          job_id=$(echo $response | grep -o '"job_id":"[^"]*"' | cut -d'"' -f4)
          if [ -z "$job_id" ]; then
            echo "Failed to extract job_id"
            exit 1
          fi
          echo "JOB_ID=$job_id" >> $GITHUB_ENV

      - name: Poll for job completion
        run: |
          max_attempts=30
          attempt=0
          while [ $attempt -lt $max_attempts ]; do
            response=$(curl -s http://localhost:3000/status/${{ env.JOB_ID }})
            echo "Status response: $response"
            status=$(echo $response | grep -o '"status":"[^"]*"' | cut -d'"' -f4)
            if [ "$status" = "completed" ]; then
              echo "Job completed successfully"
              exit 0
            fi
            echo "Attempt $((attempt + 1))/$max_attempts: Job status is $status"
            sleep 1
            attempt=$((attempt + 1))
          done
          echo "Job did not complete within timeout"
          exit 1

      - name: Cleanup - Stop containers
        if: always()
        run: docker-compose down -v

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: integration-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy with rolling update
        run: |
          echo "Deploying to production with rolling update..."
          
          # This is a placeholder for actual deployment
          # In production, you would:
          # 1. Pull new images from registry
          # 2. Start new container with health check
          # 3. Verify health check passes (60s timeout)
          # 4. Stop old container
          # 5. If health check fails, rollback
          
          echo "Deployment simulation: Starting new containers..."
          docker-compose -f docker-compose.yml up -d --no-deps --build api worker frontend
          
          echo "Verifying health checks..."
          for service in api frontend; do
            max_attempts=60
            attempt=0
            while [ $attempt -lt $max_attempts ]; do
              if docker-compose exec -T $service curl -f http://localhost:*/health 2>/dev/null; then
                echo "$service passed health check"
                break
              fi
              sleep 1
              attempt=$((attempt + 1))
            done
            if [ $attempt -eq $max_attempts ]; then
              echo "$service failed health check within 60 seconds, rolling back"
              exit 1
            fi
          done
          
          echo "Deployment completed successfully"
